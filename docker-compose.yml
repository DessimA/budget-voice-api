services:
  postgres:
    image: postgres:16-alpine
    container_name: budget_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget_network

  tts:
    build:
      context: ./tts_service
      dockerfile: Dockerfile
    container_name: budget_tts
    ports:
      - "5002:5002"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/api/tts?text=ok')\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - budget_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budget_api
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      TTS_SERVICE_URL: http://tts:5002
    depends_on:
      postgres:
        condition: service_healthy
      tts:
        condition: service_healthy
    networks:
      - budget_network

volumes:
  postgres_data:

networks:
  budget_network:
    driver: bridge
