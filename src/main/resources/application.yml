spring:
  application:
    name: budget-voice-api
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/budget_db}
    username: ${SPRING_DATASOURCE_USERNAME:budget_user}
    password: ${SPRING_DATASOURCE_PASSWORD:budget_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    retry:
      max-attempts: 5
      backoff:
        initial-interval: 1000
        multiplier: 2
        max-interval: 10000
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: meta-llama/llama-4-scout-17b-16e-instruct
          temperature: 0.3

groq:
  whisper:
    url: https://api.groq.com/openai/v1/audio/transcriptions
    model: whisper-large-v3-turbo

tts:
  coqui:
    url: ${TTS_SERVICE_URL:http://localhost:5002}

server:
  port: 8080

logging:
  level:
    com.budget: DEBUG
    org.springframework.ai: INFO
